# mainへのpushでlint→型チェック→テスト→ビルド→GitHub Pagesへデプロイする。
# 初回のみ: リポジトリ設定 → Pages → Source を「GitHub Actions」にすること。
#
# actionsはタグ(@vN)ではなくコミットハッシュで固定する(サプライチェーン対策)。
# タグは後から別コミットへ付け替えられるため、タグ指定では改ざんされたコードが
# 実行され得る。ハッシュなら内容が一意に決まる。更新時は新しいタグのハッシュを
# `gh api repos/actions/<name>/tags` で確認して、ハッシュとコメントの両方を書き換えること。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # CIと同じく警告でも失敗させる
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
