# PRと開発ブランチへのpushでlint・型チェック・テスト・ビルドを実行する。
# mainへのpushはdeploy.ymlが同じチェックをデプロイ前に実行するため対象外。
# lintは警告でも失敗させ(--error-on-warnings)、PRのステータスチェックで気づけるようにする。
#
# actionsはタグではなくコミットハッシュで固定する(サプライチェーン対策)。
# 更新手順はdeploy.yml冒頭のコメント参照。
name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

# 同じブランチへ連続pushしたとき、古いrunをキャンセルして最新だけ走らせる
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
