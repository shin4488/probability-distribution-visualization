<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="確率分布をインタラクティブに可視化 / Interactive probability distribution visualizer"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M2 28 Q10 28 13 16 T16 4 T19 16 T30 28 Z' fill='%234f8ef7'/%3E%3C/svg%3E"
    />
    <title>確率分布ビジュアライザー | Probability Distributions</title>
    <script>
      // 描画前にテーマを確定させ、ダークモード時の白いフラッシュを防ぐ。
      // 優先順位: URL(共有された状態) > localStorage(本人の前回設定) > OS設定
      (() => {
        var t = null;
        var m = null;
        // localStorageはCookie全ブロック環境などでアクセス自体が例外を投げるため防御する
        try {
          m = location.search.match(/[?&]theme=(dark|light)\b/);
          t = m ? m[1] : localStorage.getItem('pdv-theme');
        } catch {
          t = null;
        }
        if (t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
