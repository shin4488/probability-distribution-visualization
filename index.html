    <title>確率分布ビジュアライザー | Probability Distributions</title>
    <script>
      // 描画前にテーマを確定させ、ダークモード時の白いフラッシュを防ぐ。
      // 優先順位: URL(共有された状態) > localStorage(本人の前回設定) > OS設定
      (() => {
        var t = null;
        var m = null;
        // localStorageはCookie全ブロック環境などでアクセス自体が例外を投げるため防御する
        try {
          m = location.search.match(/[?&]theme=(dark|light)\b/);
          t = m ? m[1] : localStorage.getItem('pdv-theme');
        } catch {
          t = null;
        }
        if (t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <!-- SEO: 構造化データ(検索エンジンにWebアプリであることを伝える) -->
    <script type="application/ld+json">

    <!-- Google Analytics 4: ページビュー等の計測。

         注意: このアプリはパラメータ操作のたびにreplaceStateでURLを書き換えるため、
         GA4の拡張計測「ブラウザの履歴イベントに基づくページの変更」はオフを推奨
         (オンだとスライダー操作がページビューとして大量計上され得る) -->
    <script>
      (() => {
        var GA_MEASUREMENT_ID = 'G-NEDZM016GM';
        if (location.hostname !== 'shin4488.github.io') return;
        var script = document.createElement('script');
        script.async = true;
        script.src = `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`;
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () {
          // biome-ignore lint/complexity/noArguments: gtag.jsはArgumentsオブジェクト自体を要求する(配列では動作しない)
          dataLayer.push(arguments);
        };
        window.gtag('js', new Date());
        window.gtag('config', GA_MEASUREMENT_ID);
      })();
    </script>
